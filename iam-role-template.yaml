AWSTemplateFormatVersion: '2010-09-09'
Description: 'Week 1 - IAM Role with S3 Read-Only Access and Least Privilege'

Parameters:
  RoleName:
    Type: String
    Default: Week1StudentRole
    Description: Name for the IAM Role
    AllowedPattern: '^[a-zA-Z0-9+=,.@_-]+$'
    MaxLength: 64

  Environment:
    Type: String
    Default: Development
    AllowedValues:
      - Development
      - Staging
      - Production
    Description: Environment for the role

Resources:
  StudentIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      Description: 'IAM Role for Week 1 - Student Learning'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess
      Tags:
        - Key: Project
          Value: CloudComputing
        - Key: Week
          Value: '1'
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  RoleArn:
    Description: ARN of the created IAM Role
    Value: !GetAtt StudentIAMRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleArn'

  RoleName:
    Description: Name of the created IAM Role
    Value: !Ref StudentIAMRole

  StackId:
    Description: Stack ID
    Value: !Ref AWS::StackId