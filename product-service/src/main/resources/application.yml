spring:
  application:
    name: product-service

  datasource:
    url: jdbc:postgresql://postgres-product:5432/productdb
    driver-class-name: org.postgresql.Driver
    username: productuser
    password: productpass
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  kafka:
    bootstrap-servers: kafka:29092
    consumer:
      group-id: product-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: orderCreated:pt.ulusofona.productservice.event.OrderCreatedEvent

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  info:
    title: Product Service API
    description: Microservice for product management operations
    version: 1.0.0
    contact:
      name: Cloud Computing Course
      email: support@example.com

logging:
  level:
    pt.ulusofona.productservice: DEBUG
    org.springframework.web: INFO
    org.springframework.kafka: INFO

# Optional AWS SQS (Week 10 – students create queue + set URL; code ships in the template)
cloud:
  sqs:
    product-events:
      enabled: true
      queue-url: https://sqs.eu-west-1.amazonaws.com/235063678110/microservices-project-dev-order-events
      region: eu-west-1