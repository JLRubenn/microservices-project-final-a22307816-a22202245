name: Upload Artifact

on:
  push:
    branches: [ main ]

jobs:
  artifact:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create artifact
        run: |
          mkdir output
          echo "Build successful" > output/result.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: output/